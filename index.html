
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FIYIT - AI-powered learning platform for Ethiopian students" />
  <title>FIYIT — Built for Ethiopian Students</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/main.css" />
</head>

<body>

  <header class="top-bar">
    <div class="top-bar__logo">
      <span class="logo-text">FIYIT</span>
    </div>
    <div class="top-bar__actions">
      <button class="icon-btn" aria-label="Profile">👤</button>
      <button class="icon-btn" aria-label="Settings">⚙️</button>
    </div>
  </header>

  <main class="main-content">

    <section class="welcome-section">
      <h1 class="welcome-title">Hello, Student 👋</h1>
      <p class="welcome-subtitle">What would you like to learn today?</p>
    </section>

    <section class="quick-actions">
      <a href="pages/books.html" class="quick-action-btn" style="text-decoration: none; color: inherit;">
        <span class="quick-action-icon">📚</span>
        <span class="quick-action-label">Books</span>
      </a>
      <a href="pages/quiz.html" class="quick-action-btn" style="text-decoration: none; color: inherit;">
        <span class="quick-action-icon">🧠</span>
        <span class="quick-action-label">Quiz</span>
      </a>
      <a href="pages/plan.html" class="quick-action-btn" style="text-decoration: none; color: inherit;">
        <span class="quick-action-icon">📅</span>
        <span class="quick-action-label">Plan</span>
      </a>
      <a href="pages/progress.html" class="quick-action-btn" style="text-decoration: none; color: inherit;">
        <span class="quick-action-icon">📈</span>
        <span class="quick-action-label">Progress</span>
      </a>
    </section>

    <section class="chat-area" id="chatArea">
      <div class="chat-message ai-message">
        <div class="message-bubble">
          👋 Welcome to FIYIT! I'm your AI study assistant. Ask me anything about your school subjects, and I'll help you understand and practice.
        </div>
      </div>

      <div id="typingIndicator" class="typing-container hidden" style="display: none; align-items: center; gap: 0.5rem; margin-top: 1rem; padding: 0.75rem;">
        <div class="ai-avatar">🟢</div>
        <div class="typing-bubbles" style="display: flex; gap: 4px;">
          <span class="bubble" style="width: 8px; height: 8px; background-color: #facc15; border-radius: 50%;"></span>
          <span class="bubble" style="width: 8px; height: 8px; background-color: #16a34a; border-radius: 50%;"></span>
          <span class="bubble" style="width: 8px; height: 8px; background-color: #facc15; border-radius: 50%;"></span>
        </div>
      </div>
    </section>

  </main>

  <footer class="chat-input-bar">
    <button class="icon-btn" aria-label="Upload">📎</button>
    <input
      type="text"
      class="chat-input"
      id="chatInput"
      placeholder="Ask a question..."
      autocomplete="off"
    />
    <button class="icon-btn" aria-label="Voice">🎤</button>
    <button class="send-btn" id="sendBtn" aria-label="Send">➤</button>
  </footer>

  <script src="js/app.js"></script>

</body>
</html>
