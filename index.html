<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FIYIT - AI-powered learning platform for Ethiopian students" />
  <title>FIYIT — Built for Ethiopian Students</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- TOP NAVIGATION BAR -->
  <header class="top-bar">
    <div class="top-bar__logo">
      <span class="logo-text">FIYIT</span>
    </div>
    <div class="top-bar__actions">
      <button class="icon-btn" aria-label="Profile">👤</button>
      <button class="icon-btn" aria-label="Settings">⚙️</button>
    </div>
  </header>

  <!-- MAIN APP CONTAINER -->
  <main class="main-content" style="display: flex; flex-direction: column; height: calc(100vh - 120px); overflow: hidden;">

    <!-- HEADER GREETING -->
    <section class="welcome-section" style="padding: 1rem 1.5rem 0.5rem 1.5rem; flex-shrink: 0;">
      <h1 class="welcome-title" style="margin: 0; font-size: 24px;">Hello, Student 👋</h1>
      <p class="welcome-subtitle" style="margin: 4px 0 0 0; color: #6b7280; font-size: 14px;">What would you like to learn today?</p>
    </section>

    <!-- QUICK INTERACTIVE BUTTONS -->
    <section class="quick-actions" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; padding: 0.75rem 1.5rem; flex-shrink: 0; position: relative; z-index: 10;">
      <a href="pages/books.html" class="quick-action-btn" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <span class="quick-action-icon">📚</span>
        <span class="quick-action-label">Books</span>
      </a>
      <a href="pages/quiz.html" class="quick-action-btn" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <span class="quick-action-icon">🧠</span>
        <span class="quick-action-label">Quiz</span>
      </a>
      <a href="pages/plan.html" class="quick-action-btn" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <span class="quick-action-icon">📅</span>
        <span class="quick-action-label">Plan</span>
      </a>
      <a href="pages/progress.html" class="quick-action-btn" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <span class="quick-action-icon">📈</span>
        <span class="quick-action-label">Progress</span>
      </a>
    </section>

    <!-- LIVE CHAT STREAM CONTAINER -->
    <section class="chat-area" id="chatArea" style="flex: 1; overflow-y: auto; padding: 1rem 1.5rem;">
      <div class="chat-message ai-message">
        <div class="message-bubble">
          👋 Welcome to FIYIT! I'm your AI study assistant. Ask me anything about your school subjects, and I'll help you understand and practice.
        </div>
      </div>

      <!-- TYPING INDICATOR MODULE -->
      <div id="typingIndicator" class="typing-container hidden" style="align-items: center; gap: 0.5rem; margin-top: 1rem; padding: 0.75rem;">
        <div class="ai-avatar">🟢</div>
        <div class="typing-bubbles" style="display: flex; gap: 4px;">
          <span class="bubble" style="width: 8px; height: 8px; background-color: #facc15; border-radius: 50%;"></span>
          <span class="bubble" style="width: 8px; height: 8px; background-color: #16a34a; border-radius: 50%;"></span>
          <span class="bubble" style="width: 8px; height: 8px; background-color: #facc15; border-radius: 50%;"></span>
        </div>
      </div>
    </section>

  </main>

  <!-- BOTTOM INPUT CONTROLLER -->
  <footer class="chat-input-bar">
    <button class="icon-btn" aria-label="Upload">📎</button>
    <input
      type="text"
      class="chat-input"
      id="chatInput"
      placeholder="Ask a question..."
      autocomplete="off"
    />
    <button class="icon-btn" aria-label="Voice">🎤</button>
    <button class="send-btn" id="sendBtn" aria-label="Send">➤</button>
  </footer>

  <!-- CORE INTERACTION SCRIPT -->
  <script src="js/app.js"></script>

</body>
</html>
