<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIYIT 2.0 - Fluid Design</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">

    <div class="fluid-overlay"></div>
    <div class="rainbow-glow"></div>

    <header class="top-bar">
        <div class="top-icons left">⚙️</div>
        
        <div class="logo-area">
            <div id="fluid-logo" class="logo-fiyit">
                <span class="logo-f">F</span>
                <span class="logo-i">i</span>
                <span class="logo-y">y</span>
                <span class="logo-i">i</span>
                <span class="logo-t">t</span>
            </div>
            <div class="logo-glow"></div>
        </div>

        <div class="top-icons right">👤</div>
    </header>

    <main class="app-view">
        <h1 class="welcome-text">Welcome, User! 👋</h1>

        <div class="nav-grid">
            <div class="card card-books" onclick="selectCard('books')">📚 My Books</div>
            <div class="card card-quiz" onclick="selectCard('quiz')">📝 Quizzes</div>
            <div class="card card-plan" onclick="selectCard('plan')">📅 My Plan</div>
            <div class="card card-progress" onclick="selectCard('progress')">📈 Progress</div>
        </div>

        <div id="content-container">
            </div>

    </main>

    <footer class="bottom-bar">
        <div class="fluid-wave magenta"></div>
        <div class="fluid-wave ruby"></div>
        <div class="fluid-wave gold"></div>
        <button class="icon-chat">💬</button>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
