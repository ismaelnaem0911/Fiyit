<!DOCTYPE html>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="fluid-overlay"></div>

    <header class="top-bar">
        <div class="top-icons left">⚙️</div>
        
        <div class="logo-area">
            <div id="fluid-logo" class="logo-fiyit">
                <span class="logo-f">F</span>
                <span class="logo-i">i</span>
                <span class="logo-y">y</span>
                <span class="logo-i">i</span>

        <div class="top-icons right">👤</div>

    <main id="app-root">
        </main>

    <footer class="bottom-bar">

        <button class="icon-chat" onclick="alert('Chat Open')">💬</button>
