<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIYIT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-bar">
        <button class="nav-btn" onclick="setView('home')">🏠</button>
        <div class="logo">FIYIT</div>
        <button class="nav-btn">👤</button>
    </header>

    <main id="app-root"></main>

    <section class="chat-panel">
        <div id="chat-stream" class="chat-stream">
            <div class="msg ai">Ready to learn? Select a grade!</div>
        </div>
        <div class="input-container">
            <button class="action-btn" onclick="alert('Media sharing coming soon')">+</button>
            <input type="text" id="user-chat-input" placeholder="Ask AI...">
            <button class="action-btn" id="send-trigger">➤</button>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/books.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
