<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIYIT — Daily Quiz Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { background-color: #f9fafb; margin: 0; font-family: 'Inter', sans-serif; color: #1f2937; }
    .quiz-container { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
    .back-btn { display: inline-block; margin-bottom: 1.5rem; color: #16a34a; text-decoration: none; font-weight: 600; font-size: 16px; }
    .progress-bar-bg { width: 100%; height: 8px; background-color: #e5e7eb; border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-bar-fill { width: 25%; height: 100%; background-color: #16a34a; border-radius: 4px; }
    .quiz-card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
    .question-tag { display: inline-block; background-color: #facc15; color: #78350f; font-size: 12px; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 20px; margin-bottom: 1rem; }
    .question-text { font-size: 16px; font-weight: 600; line-height: 1.5; margin: 0 0 1.5rem 0; }
    .options-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .option-btn { width: 100%; text-align: left; padding: 1rem; background: white; border: 1px solid #e5e7eb; border-radius: 12px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.75rem; color: #1f2937; }
    .option-btn.selected { border-color: #16a34a; background-color: #f0fdf4; }
    .option-btn.correct { border-color: #22c55e; background-color: #dcfce7; color: #15803d; font-weight: 600; }
    .option-btn.incorrect { border-color: #ef4444; background-color: #fee2e2; color: #b91c1c; }
    .option-letter { display: inline-flex; width: 24px; height: 24px; background: #f3f4f6; border-radius: 50%; justify-content: center; align-items: center; font-size: 12px; font-weight: 700; color: #4b5563; }
    .option-btn.selected .option-letter { background: #16a34a; color: white; }
    .option-btn.correct .option-letter { background: #22c55e; color: white; }
    .option-btn.incorrect .option-letter { background: #ef4444; color: white; }
    .submit-btn { width: 100%; padding: 1rem; background-color: #16a34a; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; text-align: center; }
    .submit-btn:disabled { background-color: #d1d5db; cursor: not-allowed; }
    .feedback-text { text-align: center; font-weight: 600; margin-top: 1rem; font-size: 15px; display: none; }
  </style>
</head>
<body>
  <div class="quiz-container">
    <a href="../index.html" class="back-btn">⬅ Back to Chat</a>
    <h1 style="font-size: 24px; font-weight: 700; margin: 0 0 0.25rem 0;">Daily Challenge</h1>
    <p style="font-size: 14px; color: #6b7280; margin-bottom: 1rem;">Question 1 of 4</p>
    <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
    <div class="quiz-card">
      <span class="question-tag">MATHEMATICS</span>
      <p class="question-text">What is the value of x in the equation: 2x + 5 = 15?</p>
      <div class="options-list">
        <button class="option-btn" data-index="A"><span class="option-letter">A</span> x = 3</button>
        <button class="option-btn" data-correct="true" data-index="B"><span class="option-letter">B</span> x = 5</button>
        <button class="option-btn" data-index="C"><span class="option-letter">C</span> x = 10</button>
        <button class="option-btn" data-index="D"><span class="option-letter">D</span> x = 20</button>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" disabled>Select an Answer</button>
    <div class="feedback-text" id="feedback"></div>
  </div>
  <script>
    const optionButtons = document.querySelectorAll('.option-btn');
    const submitBtn = document.getElementById('submitBtn');
    const feedback = document.getElementById('feedback');
    let selectedOption = null;
    let isAnswerChecked = false;

    optionButtons.forEach(button => {
      button.addEventListener('click', () => {
        if (isAnswerChecked) return;
        optionButtons.forEach(btn => btn.classList.remove('selected'));
        button.classList.add('selected');
        selectedOption = button;
        submitBtn.disabled = false;
        submitBtn.textContent = "Check Answer";
      });
    });

    submitBtn.addEventListener('click', () => {
      if (!selectedOption || isAnswerChecked) return;
      isAnswerChecked = true;
      const isCorrect = selectedOption.getAttribute('data-correct') === 'true';
      selectedOption.classList.remove('selected');
      if (isCorrect) {
        selectedOption.classList.add('correct');
        feedback.textContent = "🎉 Correct! Outstanding calculation skills, bro!";
        feedback.style.color = "#16a34a";
      } else {
        selectedOption.classList.add('incorrect');
        feedback.textContent = "❌ Not quite right. Try factoring the problem again!";
        feedback.style.color = "#ef4444";
        optionButtons.forEach(btn => {
          if (btn.getAttribute('data-correct') === 'true') {
            btn.classList.add('correct');
          }
        });
      }
      feedback.style.display = "block";
      submitBtn.textContent = "Challenge Completed";
      submitBtn.disabled = true;
    });
  </script>
</body>
</html>
