<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIYIT — Study Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { background-color: #f9fafb; margin: 0; font-family: 'Inter', sans-serif; color: #1f2937; }
    .plan-container { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
    .back-btn { display: inline-block; margin-bottom: 1.5rem; color: #16a34a; text-decoration: none; font-weight: 600; font-size: 16px; }
    .task-card { background: white; border-radius: 16px; padding: 1.25rem; border: 1px solid #e5e7eb; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
    .task-date { background: #fef3c7; color: #92400e; padding: 0.5rem; border-radius: 8px; text-align: center; min-width: 50px; }
    .day { font-size: 12px; font-weight: 700; display: block; }
    .date { font-size: 18px; font-weight: 700; display: block; }
    .task-info { flex: 1; }
    .task-title { font-weight: 600; display: block; margin-bottom: 0.25rem; }
    .task-subject { font-size: 12px; color: #6b7280; }
    .add-btn { width: 100%; padding: 1rem; background-color: #16a34a; color: white; border: none; border-radius: 12px; font-weight: 600; margin-top: 1rem; cursor: pointer; font-family: inherit; font-size: 15px; }
  </style>
</head>
<body>
  <div class="plan-container">
    <a href="../index.html" class="back-btn">⬅ Back to Chat</a>
    <h1 style="font-size: 24px; font-weight: 700; margin: 0 0 1.5rem 0;">Weekly Study Plan</h1>
    <div class="task-card">
      <div class="task-date"><span class="day">MON</span><span class="date">10</span></div>
      <div class="task-info"><span class="task-title">Math Exercises</span><span class="task-subject">Chapters 1-3</span></div>
    </div>
    <div class="task-card">
      <div class="task-date"><span class="day">WED</span><span class="date">12</span></div>
      <div class="task-info"><span class="task-title">Biology Lab Report</span><span class="task-subject">Cell Division</span></div>
    </div>
    <div class="task-card">
      <div class="task-date"><span class="day">FRI</span><span class="date">14</span></div>
      <div class="task-info"><span class="task-title">Chemistry Review</span><span class="task-subject">Periodic Table</span></div>
    </div>
    <button class="add-btn">+ Add New Session</button>
  </div>
</body>
</html>
