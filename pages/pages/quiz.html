<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIYIT - Quiz 🧪</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <header class="top-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #e5e7eb;">
        <a href="../index.html" style="text-decoration: none; font-size: 1.5rem; font-weight: bold; color: #16a34a;">⬅ FIYIT</a>
        <h2 style="font-size: 1.2rem; margin: 0;">Quiz Challenge 🧪</h2>
        <div style="width: 32px;"></div>
    </header>

    <main style="padding: 1rem; max-width: 600px; margin: 0 auto;">
        <h3>Choose Your Category</h3>
        <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
            <label style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 0.5rem;">
                <input type="radio" name="quiz-cat" checked>
                <span>📝 National Exam Prep (ESSLCE)</span>
            </label>
            <label style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 0.5rem;">
                <input type="radio" name="quiz-cat">
                <span>⏱️ Quick Chapter Review</span>
            </label>
        </div>

        <button style="width: 100%; padding: 1rem; background-color: #16a34a; color: white; border: none; border-radius: 0.5rem; font-size: 1.1rem; font-weight: bold;">
            Start Quiz 🚀
        </button>
    </main>
</body>
</html>
