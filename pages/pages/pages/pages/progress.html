<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIYIT - Progress 📈</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <header class="top-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #e5e7eb;">
        <a href="../index.html" style="text-decoration: none; font-size: 1.5rem; font-weight: bold; color: #16a34a;">⬅ FIYIT</a>
        <h2 style="font-size: 1.2rem; margin: 0;">Performance 📈</h2>
        <div style="width: 32px;"></div>
    </header>

    <main style="padding: 1rem; max-width: 600px; margin: 0 auto;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div style="background-color: #fef9c3; border: 1px solid #facc15; padding: 1rem; border-radius: 0.75rem; text-align: center;">
                <h4 style="margin: 0; color: #854d0e;">Total XP</h4>
                <p style="font-size: 1.75rem; font-weight: bold; margin: 0.5rem 0 0 0;">340 ✨</p>
            </div>
            <div style="background-color: #fee2e2; border: 1px solid #ef4444; padding: 1rem; border-radius: 0.75rem; text-align: center;">
                <h4 style="margin: 0; color: #991b1b;">Day Streak</h4>
                <p style="font-size: 1.75rem; font-weight: bold; margin: 0.5rem 0 0 0;">5 Days 🔥</p>
            </div>
        </div>

        <h3>Weekly Study Hours</h3>
        <div style="height: 150px; background-color: #f3f4f6; border: 2px dashed #d1d5db; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; color: #6b7280;">
            📊 Progress Chart Visual Component Coming Soon
        </div>
    </main>
</body>
</html>
