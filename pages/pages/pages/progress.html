<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIYIT — Your Progress</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../css/main.css">
  
  <style>
    body { background-color: #f9fafb; margin: 0; font-family: 'Inter', sans-serif; color: #1f2937; }
    .progress-container { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
    .back-btn { display: inline-block; margin-bottom: 1.5rem; color: #16a34a; text-decoration: none; font-weight: 600; font-size: 16px; }
    .stat-card { background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid #e5e7eb; margin-bottom: 1rem; text-align: center; }
    .stat-value { font-size: 32px; font-weight: 700; color: #16a34a; display: block; }
    .stat-label { font-size: 14px; color: #6b7280; }
    .chart-box { background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid #e5e7eb; }
    .bar-wrapper { margin-bottom: 1rem; }
    .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 0.25rem; font-weight: 600; }
    .bar-bg { height: 12px; background: #e5e7eb; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; background: #16a34a; border-radius: 6px; }
  </style>
</head>
<body>

  <div class="progress-container">
    <a href="../index.html" class="back-btn">⬅ Back to Chat</a>

    <h1 style="font-size: 24px; font-weight: 700; margin: 0 0 1.5rem 0;">Your Learning Stats</h1>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div class="stat-card">
        <span class="stat-value">12</span>
        <span class="stat-label">Quizzes Passed</span>
      </div>
      <div class="stat-card">
        <span class="stat-value">85%</span>
        <span class="stat-label">Avg. Score</span>
      </div>
    </div>

    <div class="chart-box">
      <h3 style="margin-top: 0;">Subject Mastery</h3>
      <div class="bar-wrapper">
        <div class="bar-label"><span>Mathematics</span><span>90%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width: 90%;"></div></div>
      </div>
      <div class="bar-wrapper">
        <div class="bar-label"><span>Biology</span><span>75%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width: 75%;"></div></div>
      </div>
      <div class="bar-wrapper">
        <div class="bar-label"><span>Chemistry</span><span>60%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width: 60%;"></div></div>
      </div>
    </div>
  </div>

</body>
</html>
